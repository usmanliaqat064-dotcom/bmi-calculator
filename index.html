<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart BMI Calculator</title>
    <style>
        /* Design Colors aur Layout */
        body {
            font-family: 'Arial', sans-serif;
            background-color: #E8F0FE; /* Background halka blue */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .main-container {
            background: white;
            width: 90%;
            max-width: 400px;
            padding: 25px;
            border-radius: 30px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            text-align: center;
        }

        h2 {
            color: #2D54B8; /* Royal Blue Title */
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 25px;
        }

        /* Toggle Button Area */
        .toggle-container {
            background: #F0F2F5;
            border-radius: 12px;
            display: flex;
            padding: 5px;
            margin-bottom: 25px;
        }

        .toggle-btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            color: #666;
            background: transparent;
            transition: 0.3s;
        }

        .toggle-btn.active {
            background: #2D54B8; /* Active color */
            color: white;
        }

        /* Input Styles */
        .input-box {
            text-align: left;
            margin-bottom: 15px;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: #333;
        }

        input {
            width: 100%;
            padding: 15px;
            border: 1px solid #D1D5DB;
            border-radius: 15px;
            font-size: 16px;
            background: #F9FAFB;
            box-sizing: border-box;
        }

        /* Calculate Button */
        .calculate-btn {
            width: 100%;
            background: #2D54B8;
            color: white;
            padding: 15px;
            border: none;
            border-radius: 15px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin: 20px 0;
            box-shadow: 0 4px 10px rgba(45, 84, 184, 0.3);
        }

        /* Result Display */
        #result-display {
            margin-top: 10px;
            font-size: 18px;
            font-weight: bold;
            padding: 10px;
            border-radius: 10px;
            display: none;
        }

        /* Legend Grid (Bottom) */
        .grid-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 20px;
        }

        .grid-item {
            background: #F8FAFC;
            padding: 10px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            font-size: 11px;
            color: #444;
        }

        .dot {
            height: 10px;
            width: 10px;
            border-radius: 50%;
            margin-right: 8px;
        }

        .footer-text {
            font-size: 12px;
            color: #999;
            margin-top: 25px;
        }
    </style>
</head>
<body>

<div class="main-container">
    <h2>Smart BMI Calculator</h2>

    <div class="toggle-container">
        <button id="metricBtn" class="toggle-btn" onclick="toggleUnits('metric')">Metric (kg/cm)</button>
        <button id="usBtn" class="toggle-btn active" onclick="toggleUnits('us')">US Standard (lbs/in)</button>
    </div>

    <div class="input-box">
        <label id="weightLabel">Weight (lbs)</label>
        <input type="number" id="weightInput" placeholder="e.g. 154">
    </div>

    <div class="input-box">
        <label id="heightLabel">Height (in)</label>
        <input type="number" id="heightInput" placeholder="e.g. 69">
    </div>

    <button class="calculate-btn" onclick="calculate()">Calculate My BMI</button>

    <div id="result-display"></div>

    <div class="grid-container">
        <div class="grid-item"><span class="dot" style="background:#3B82F6"></span> Underweight < 18.5</div>
        <div class="grid-item"><span class="dot" style="background:#10B981"></span> Healthy 18.5 - 24.9</div>
        <div class="grid-item"><span class="dot" style="background:#F59E0B"></span> Overweight 25 - 29.9</div>
        <div class="grid-item"><span class="dot" style="background:#EF4444"></span> Obese > 30.0</div>
    </div>

    <p class="footer-text">BMI is a screening tool, not a medical diagnosis.</p>
</div>

<script>
    let mode = 'us'; // Default mode

    function toggleUnits(unit) {
        mode = unit;
        document.getElementById('metricBtn').classList.remove('active');
        document.getElementById('usBtn').classList.remove('active');
        
        if(unit === 'metric') {
            document.getElementById('metricBtn').classList.add('active');
            document.getElementById('weightLabel').innerText = "Weight (kg)";
            document.getElementById('heightLabel').innerText = "Height (cm)";
            document.getElementById('weightInput').placeholder = "e.g. 70";
            document.getElementById('heightInput').placeholder = "e.g. 175";
        } else {
            document.getElementById('usBtn').classList.add('active');
            document.getElementById('weightLabel').innerText = "Weight (lbs)";
            document.getElementById('heightLabel').innerText = "Height (in)";
            document.getElementById('weightInput').placeholder = "e.g. 154";
            document.getElementById('heightInput').placeholder = "e.g. 69";
        }
    }

    function calculate() {
        let weight = parseFloat(document.getElementById('weightInput').value);
        let height = parseFloat(document.getElementById('heightInput').value);
        let resultDiv = document.getElementById('result-display');

        if(!weight || !height) {
            alert("Meharbani karke dono values enter karein.");
            return;
        }

        let bmi = 0;
        if(mode === 'metric') {
            // Formula: kg / (m * m)
            let heightInMeters = height / 100;
            bmi = weight / (heightInMeters * heightInMeters);
        } else {
            // Formula: (lbs / (in * in)) * 703
            bmi = (weight / (height * height)) * 703;
        }

        let finalBmi = bmi.toFixed(1);
        resultDiv.style.display = "block";
        resultDiv.innerHTML = "Aapka BMI: " + finalBmi;

        // Result ke mutabiq colour change karna
        if(finalBmi < 18.5) resultDiv.style.color = "#3B82F6";
        else if(finalBmi < 25) resultDiv.style.color = "#10B981";
        else if(finalBmi < 30) resultDiv.style.color = "#F59E0B";
        else resultDiv.style.color = "#EF4444
