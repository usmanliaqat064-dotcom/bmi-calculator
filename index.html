<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smart BMI Calculator</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    * { font-family: 'Inter', sans-serif; box-sizing: border-box; }
    body { margin: 0; background: #f0f4ff; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }
    input[type=number] { -moz-appearance: textfield; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes countUp {
      from { opacity: 0; transform: scale(0.7); }
      to   { opacity: 1; transform: scale(1); }
    }
    @keyframes barGrow { from { width: 0; } }

    .fade-up  { animation: fadeUp  0.45s cubic-bezier(.4,0,.2,1) both; }
    .count-up { animation: countUp 0.5s  cubic-bezier(.34,1.56,.64,1) both; }
    .bar-grow { animation: barGrow 0.7s  cubic-bezier(.4,0,.2,1) both; }

    .input-field {
      width: 100%; border: 1.5px solid #e2e8f0; border-radius: 10px;
      padding: 13px 16px; font-size: 16px; outline: none;
      transition: border-color 0.2s, box-shadow 0.2s; background: #fff; color: #1e293b;
    }
    .input-field:focus { border-color: #3b5bdb; box-shadow: 0 0 0 3px rgba(59,91,219,0.12); }

    .calc-btn {
      width: 100%; background: linear-gradient(135deg, #3b5bdb, #4c6ef5);
      color: white; border: none; border-radius: 12px; padding: 16px;
      font-size: 16px; font-weight: 600; cursor: pointer; letter-spacing: 0.3px;
      box-shadow: 0 4px 20px rgba(59,91,219,0.35);
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .calc-btn:hover  { transform: translateY(-1px); box-shadow: 0 6px 24px rgba(59,91,219,0.45); }
    .calc-btn:active { transform: scale(0.98); }

    .toggle-pill { transition: all 0.2s; cursor: pointer; border: none; }
    .needle-line { transition: transform 0.85s cubic-bezier(.34,1.2,.64,1); }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState } = React;

/* ── helpers ───────────────────────────────────── */
function calcBMI(w, h, unit) {
  if (!w || !h || w <= 0 || h <= 0) return null;
  if (unit === 'metric') {
    const hm = h / 100;
    return w / (hm * hm);
  }
  return (w / (h * h)) * 703;
}

const CATS = [
  { label:'Underweight', range:'< 18.5',      min:0,    max:18.5, dot:'#60a5fa', bg:'#eff6ff', border:'#bfdbfe', text:'#1d4ed8', badge:'#dbeafe',
    tip:'💡 Consider a balanced, calorie-rich diet and consult a nutritionist for guidance.' },
  { label:'Healthy',     range:'18.5 – 24.9',  min:18.5, max:25,   dot:'#34d399', bg:'#f0fdf4', border:'#a7f3d0', text:'#065f46', badge:'#d1fae5',
    tip:'✅ Great job! Keep it up with a balanced diet and regular exercise.' },
  { label:'Overweight',  range:'25 – 29.9',    min:25,   max:30,   dot:'#fbbf24', bg:'#fffbeb', border:'#fde68a', text:'#92400e', badge:'#fef3c7',
    tip:'⚠️ Increasing physical activity and adjusting your diet can help reach a healthy weight.' },
  { label:'Obese',       range:'> 30',          min:30,   max:999,  dot:'#f87171', bg:'#fff1f2', border:'#fecdd3', text:'#9f1239', badge:'#ffe4e6',
    tip:'🔴 Please consult a healthcare professional for a personalised plan.' },
];

function getCat(bmi)         { return CATS.find(c => bmi >= c.min && bmi < c.max); }
function needleAngle(bmi)    { return -90 + Math.min(1, Math.max(0, (bmi - 10) / 30)) * 180; }
function barPercent(bmi)     { return Math.min(100, Math.max(2, ((bmi - 10) / 30) * 100)); }

/* ── Gauge ─────────────────────────────────────── */
function Gauge({ bmi, cat, animKey }) {
  const angle = needleAngle(bmi);
  return (
    <svg viewBox="0 0 200 115" style={{ width:'100%', maxWidth:280, display:'block', margin:'0 auto' }}>
      <defs>
        <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%"   stopColor="#60a5fa"/>
          <stop offset="33%"  stopColor="#34d399"/>
          <stop offset="66%"  stopColor="#fbbf24"/>
          <stop offset="100%" stopColor="#f87171"/>
        </linearGradient>
      </defs>
      {/* track */}
      <path d="M20 100 A80 80 0 0 1 180 100" fill="none" stroke="#e2e8f0"       strokeWidth="13" strokeLinecap="round"/>
      {/* colour arc */}
      <path d="M20 100 A80 80 0 0 1 180 100" fill="none" stroke="url(#g)"        strokeWidth="13" strokeLinecap="round" opacity=".9"/>
      {/* needle group — rotate around 100,100 */}
      <g key={animKey} style={{ transform:`rotate(${angle}deg)`, transformOrigin:'100px 100px', transition:'transform 0.85s cubic-bezier(.34,1.2,.64,1)' }}>
        <line x1="100" y1="100" x2="100" y2="34" stroke={cat.dot} strokeWidth="2.5" strokeLinecap="round"/>
      </g>
      <circle cx="100" cy="100" r="6"  fill={cat.dot}/>
      <circle cx="100" cy="100" r="2.5" fill="#fff"/>
      {/* tick labels */}
      {[['10',16,108],['18.5',47,63],['25',100,28],['30',153,63],['40+',184,108]].map(([t,x,y])=>(
        <text key={t} x={x} y={y} textAnchor="middle" fontSize="7.5" fill="#94a3b8" fontFamily="Inter,sans-serif">{t}</text>
      ))}
    </svg>
  );
}

/* ── Ideal range hint ───────────────────────────── */
function IdealRange({ height, unit }) {
  if (!height || height <= 0) return null;
  let lo, hi, uStr;
  if (unit === 'metric') {
    const hm = height / 100;
    lo = (18.5 * hm * hm).toFixed(1); hi = (24.9 * hm * hm).toFixed(1); uStr = 'kg';
  } else {
    lo = ((18.5 * height * height) / 703).toFixed(1);
    hi = ((24.9 * height * height) / 703).toFixed(1); uStr = 'lbs';
  }
  return (
    <p style={{ fontSize:12, color:'#64748b', marginTop:5 }}>
      Ideal weight range: <strong style={{ color:'#475569' }}>{lo} – {hi} {uStr}</strong>
    </p>
  );
}

/* ── App ────────────────────────────────────────── */
function App() {
  const [unit,    setUnit]    = useState('metric');
  const [weight,  setWeight]  = useState('');
  const [height,  setHeight]  = useState('');
  const [result,  setResult]  = useState(null);
  const [error,   setError]   = useState('');
  const [animKey, setAnimKey] = useState(0);

  const labels = unit === 'metric'
    ? { w:'Weight (kg)', h:'Height (cm)', wp:'e.g. 70', hp:'e.g. 175' }
    : { w:'Weight (lbs)',h:'Height (in)', wp:'e.g. 154',hp:'e.g. 69'  };

  function switchUnit(u) { setUnit(u); setResult(null); setWeight(''); setHeight(''); setError(''); }

  function calculate() {
    const w = parseFloat(weight), h = parseFloat(height);
    const bmi = calcBMI(w, h, unit);
    if (!bmi) { setError('Please enter valid weight and height values.'); setResult(null); return; }
    setError('');
    setResult(bmi);
    setAnimKey(k => k + 1);
  }

  const cat = result ? getCat(result) : null;

  return (
    <div style={{ width:'100%', maxWidth:480 }}>
      <div style={{ background:'#fff', borderRadius:20, boxShadow:'0 8px 40px rgba(59,91,219,.1)', padding:'32px 28px' }}>

        {/* Title */}
        <h1 style={{ fontSize:24, fontWeight:700, color:'#3b5bdb', textAlign:'center', margin:'0 0 22px' }}>
          Smart BMI Calculator
        </h1>

        {/* Toggle */}
        <div style={{ display:'flex', background:'#f1f5f9', borderRadius:10, padding:4, marginBottom:22, gap:4 }}>
          {['metric','imperial'].map(u => (
            <button key={u} className="toggle-pill" onClick={() => switchUnit(u)}
              style={{ flex:1, padding:'9px 0', borderRadius:8, fontWeight:600, fontSize:13,
                background: unit===u ? '#3b5bdb' : 'transparent',
                color:      unit===u ? '#fff'    : '#64748b',
                boxShadow:  unit===u ? '0 2px 8px rgba(59,91,219,.25)' : 'none' }}>
              {u === 'metric' ? 'Metric (kg/cm)' : 'US Standard (lbs/in)'}
            </button>
          ))}
        </div>

        {/* Weight */}
        <div style={{ marginBottom:14 }}>
          <label style={{ fontSize:13, fontWeight:500, color:'#475569', display:'block', marginBottom:6 }}>{labels.w}</label>
          <input className="input-field" type="number" placeholder={labels.wp} value={weight}
            onChange={e => setWeight(e.target.value)} onKeyDown={e => e.key==='Enter' && calculate()} />
        </div>

        {/* Height */}
        <div style={{ marginBottom:20 }}>
          <label style={{ fontSize:13, fontWeight:500, color:'#475569', display:'block', marginBottom:6 }}>{labels.h}</label>
          <input className="input-field" type="number" placeholder={labels.hp} value={height}
            onChange={e => setHeight(e.target.value)} onKeyDown={e => e.key==='Enter' && calculate()} />
          <IdealRange height={parseFloat(height)} unit={unit} />
        </div>

        {error && <p style={{ color:'#ef4444', fontSize:13, marginBottom:12 }}>{error}</p>}

        <button className="calc-btn" onClick={calculate}>Calculate My BMI</button>

        {/* ── Result ── */}
        {result && cat && (
          <div key={animKey} className="fade-up"
            style={{ marginTop:24, background:cat.bg, border:`1.5px solid ${cat.border}`, borderRadius:14, padding:'20px 16px' }}>

            <Gauge bmi={result} cat={cat} animKey={animKey} />

            {/* Number */}
            <div style={{ textAlign:'center', margin:'4px 0 16px' }}>
              <div className="count-up" style={{ fontSize:54, fontWeight:700, color:cat.text, lineHeight:1 }}>
                {result.toFixed(1)}
              </div>
              <div style={{ display:'inline-block', marginTop:9, background:cat.badge,
                color:cat.text, borderRadius:20, padding:'4px 18px', fontWeight:600, fontSize:15 }}>
                {cat.label}
              </div>
              <p style={{ color:'#64748b', fontSize:13, marginTop:5 }}>BMI {cat.range}</p>
            </div>

            {/* Bar */}
            <div style={{ background:'#e2e8f0', borderRadius:6, height:8, overflow:'hidden', marginBottom:4 }}>
              <div className="bar-grow"
                style={{ height:'100%', width:`${barPercent(result)}%`,
                  background:`linear-gradient(90deg,#60a5fa,${cat.dot})`, borderRadius:6 }} />
            </div>
            <div style={{ display:'flex', justifyContent:'space-between', fontSize:10, color:'#94a3b8', marginBottom:14 }}>
              <span>10</span><span>18.5</span><span>25</span><span>30</span><span>40</span>
            </div>

            {/* Tip */}
            <div style={{ background:'rgba(255,255,255,.65)', borderRadius:10, padding:'10px 14px',
              fontSize:13, color:'#475569', lineHeight:1.5 }}>
              {cat.tip}
            </div>
          </div>
        )}

        {/* Legend */}
        <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:6, marginTop:18 }}>
          {CATS.map(c => (
            <div key={c.label} style={{ display:'flex', alignItems:'center', gap:7,
              background:'#f8fafc', borderRadius:8, padding:'7px 10px' }}>
              <span style={{ width:10, height:10, borderRadius:'50%', background:c.dot, flexShrink:0 }}/>
              <span style={{ fontSize:12, color:'#475569', fontWeight:500 }}>{c.label}</span>
              <span style={{ fontSize:10, color:'#94a3b8', marginLeft:'auto' }}>{c.range}</span>
            </div>
          ))}
        </div>

      </div>

      <p style={{ textAlign:'center', color:'#94a3b8', fontSize:11, marginTop:14 }}>
        BMI is a screening tool, not a medical diagnosis.
      </p>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
