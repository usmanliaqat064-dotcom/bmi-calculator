<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart BMI Calculator</title>
    <style>
        :root {
            /* Exact Colors from your image */
            --primary-blue: #2D50C1;
            --bg-gradient: linear-gradient(180deg, #E6EEFF 0%, #FFFFFF 100%);
            --input-bg: #F5F7FA;
            --text-grey: #6B7280;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg-gradient);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            background: white;
            padding: 30px 20px;
            border-radius: 30px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.05);
            width: 90%;
            max-width: 380px;
            text-align: center;
        }

        h1 {
            color: var(--primary-blue);
            font-size: 24px;
            margin-bottom: 25px;
            font-weight: 800;
        }

        /* Toggle Switches */
        .toggle-container {
            display: flex;
            background: #EDF2F7;
            border-radius: 12px;
            padding: 4px;
            margin-bottom: 25px;
        }

        .toggle-btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            color: var(--text-grey);
            background: transparent;
        }

        .toggle-btn.active {
            background: var(--primary-blue);
            color: white;
            box-shadow: 0 4px 10px rgba(45, 80, 193, 0.3);
        }

        /* Input Fields */
        .input-group {
            text-align: left;
            margin-bottom: 15px;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 15px;
            border: 1px solid #E2E8F0;
            border-radius: 12px;
            background: var(--input-bg);
            font-size: 16px;
            box-sizing: border-box;
        }

        /* Calculate Button */
        .calc-btn {
            width: 100%;
            padding: 16px;
            background: var(--primary-blue);
            color: white;
            border: none;
            border-radius: 15px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 20px;
            box-shadow: 0 5px 15px rgba(45, 80, 193, 0.3);
        }

        /* Status Grid (Exact match to your UI) */
        .grid-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 30px;
        }

        .status-box {
            background: #F8FAFC;
            padding: 12px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            font-size: 12px;
            color: #475569;
        }

        .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-right: 8px;
        }

        /* Result Display */
        #result-display {
            margin-top: 20px;
            padding: 15px;
            border-radius: 12px;
            display: none;
            font-weight: bold;
        }

        .footer-text {
            font-size: 11px;
            color: #94A3B8;
            margin-top: 25px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Smart BMI Calculator</h1>

    <div class="toggle-container">
        <button id="metricBtn" class="toggle-btn active" onclick="switchUnit('metric')">Metric (kg/cm)</button>
        <button id="usBtn" class="toggle-btn" onclick="switchUnit('us')">US Standard (lbs/in)</button>
    </div>

    <div class="input-group">
        <label id="weightLabel">Weight (kg)</label>
        <input type="number" id="weight" placeholder="e.g. 70">
    </div>

    <div class="input-group">
        <label id="heightLabel">Height (cm)</label>
        <input type="number" id="height" placeholder="e.g. 175">
    </div>

    <button class="calc-btn" onclick="calculateBMI()">Calculate My BMI</button>

    <div id="result-display"></div>

    <div class="grid-container">
        <div class="status-box"><span class="dot" style="background:#3B82F6"></span> Underweight < 18.5</div>
        <div class="status-box"><span class="dot" style="background:#10B981"></span> Healthy 18.5-24.9</div>
        <div class="status-box"><span class="dot" style="background:#F59E0B"></span> Overweight 25-29.9</div>
        <div class="status-box"><span class="dot" style="background:#EF4444"></span> Obese > 30.0</div>
    </div>

    <p class="footer-text">BMI is a screening tool, not a medical diagnosis.</p>
</div>

<script>
    let unit = 'metric';

    function switchUnit(selectedUnit) {
        unit = selectedUnit;
        const mBtn = document.getElementById('metricBtn');
        const uBtn = document.getElementById('usBtn');
        const wLabel = document.getElementById('weightLabel');
        const hLabel = document.getElementById('heightLabel');

        if (unit === 'metric') {
            mBtn.classList.add('active');
            uBtn.classList.remove('active');
            wLabel.innerText = "Weight (kg)";
            hLabel.innerText = "Height (cm)";
            document.getElementById('weight').placeholder = "e.g. 70";
            document.getElementById('height').placeholder = "e.g. 175";
        } else {
            uBtn.classList.add('active');
            mBtn.classList.remove('active');
            wLabel.innerText = "Weight (lbs)";
            hLabel.innerText = "Height (in)";
            document.getElementById('weight').placeholder = "e.g. 154";
            document.getElementById('height').placeholder = "e.g. 69";
        }
    }

    function calculateBMI() {
        const w = parseFloat(document.getElementById('weight').value);
        const h = parseFloat(document.getElementById('height').value);
        const resDiv = document.getElementById('result-display');

        if (!w || !h) {
            alert("Please enter values!");
            return;
        }

        let bmi = 0;
        if (unit === 'metric') {
            // Metric: kg / (m^2)
            bmi = w / ((h / 100) * (h / 100));
        } else {
            // US: (lbs / in^2) * 703
            bmi = (w / (h * h)) * 703;
        }

        const finalBmi = bmi.toFixed(1);
        resDiv.style.display = "block";
        resDiv.innerHTML = `Your BMI is: ${finalBmi}`;
        
        // Color coding result
        if(finalBmi < 18.5) resDiv.style.color = "#3B82F6";
        else if(finalBmi <= 24.9) resDiv.style.color = "#10B981";
        else if(finalBmi <= 29.9) resDiv.style.color = "#F59E0B";
        else resDiv.style.color = "#EF4444";
    }
</script>

</body>
</html>
